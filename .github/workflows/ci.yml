name: Preview Build

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-preview:
    name: Build static HTML preview
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Build a static preview from Fluid partials/templates ────────────
      # Since we have no full TYPO3 instance in CI, we generate a lightweight
      # static HTML preview that wires in the real CSS/JS/images so the design
      # can be reviewed on GitHub Pages without installing TYPO3.
      - name: Generate static preview
        run: |
          mkdir -p dist/assets/css dist/assets/js dist/assets/images

          # Copy compiled assets
          cp packages/reasco_site/Resources/Public/Css/styles.css dist/assets/css/
          cp packages/reasco_site/Resources/Public/Js/scripts.js  dist/assets/js/

          # Copy images recursively so nested folders (e.g. Images/live) are available in preview.
          cp -R packages/reasco_site/Resources/Public/Images/. dist/assets/images/

          # Strip TYPO3-specific Fluid syntax (viewhelpers + comments) from
          # HTML partials so browsers can render a close approximation.
          node - <<'EOF'
          const fs   = require('fs');
          const path = require('path');

          const BASE  = 'packages/reasco_site/Resources/Private';
          const DIST  = 'dist';
          const ASSET = '../assets';   // relative from dist pages

          function applyPageVars(src, page) {
            return src
              .replace(/\{page\.title\}/g, page.pageTitle || page.title || 'Reasco Immobilien AG')
              .replace(/\{page\.subtitle\}/g, page.subtitle || '')
              .replace(/\{page\.description\}/g, page.description || '');
          }

          function resolveFluidIf(src, page) {
            return src.replace(/<f:if\s+condition="([^"]+)">([\s\S]*?)<\/f:if>/g, (_, condition, body) => {
              const thenMatch = body.match(/<f:then>([\s\S]*?)<\/f:then>/);
              const elseMatch = body.match(/<f:else>([\s\S]*?)<\/f:else>/);
              let isTrue = false;

              if (/\{page\.title\}/.test(condition)) isTrue = !!(page.pageTitle || page.title);
              else if (/\{page\.description\}/.test(condition)) isTrue = !!page.description;
              else if (/\{page\.subtitle\}/.test(condition)) isTrue = !!page.subtitle;
              else if (/\{page\.no_index\}/.test(condition)) isTrue = false;
              else if (/\{page\.og_image\}/.test(condition)) isTrue = false;
              else if (/^\!\{/.test(condition)) isTrue = false;

              if (thenMatch || elseMatch) {
                return isTrue ? (thenMatch ? thenMatch[1] : '') : (elseMatch ? elseMatch[1] : '');
              }

              return isTrue ? body : '';
            });
          }

          function stripFluid(src) {
            return src
              // Remove Fluid comments
              .replace(/<f:comment>[\s\S]*?<\/f:comment>/g, '')
              // Remove unsupported fluid structural tags that can leak into output
              .replace(/<f:then>|<\/f:then>|<f:else>|<\/f:else>/g, '')
              // Remove remaining f:* tags (self-closing or paired)
              .replace(/<f:[^>]*\/>/g, '')
              .replace(/<\/?f:[^>]*>/g, '')
              // Replace resource URIs with relative path
              .replace(/\{f:uri\.resource\(path:\s*'([^']+)',\s*extensionName:\s*'[^']+'\)\}/g,
                `${ASSET}/images/$1`.replace('Images/', ''))
              // Replace page URIs with #
              .replace(/\{f:uri\.page\([^)]*\)\}/g, '#')
              // Replace simple Fluid vars with placeholder text
              .replace(/\{siteName\}/g, 'Reasco Immobilien AG')
              .replace(/\{phone\}/g, '+41 52 551 07 77')
              .replace(/\{email\}/g, 'info@reasco.immo')
              .replace(/\{emailSales\}/g, 'vermarktung@reasco.immo')
              .replace(/\{linkedIn\}/g,  'https://www.linkedin.com')
              .replace(/\{facebook\}/g,  'https://www.facebook.com')
              .replace(/\{instagram\}/g, 'https://www.instagram.com')
              // Remove remaining unresolved Fluid vars/expressions
              .replace(/\{[^}]{1,80}\}/g, '')
              // Remove ##UID## placeholders in href
              .replace(/href="[^"]*##[^"]*##[^"]*"/g, 'href="#"')
              // Image paths: remove 'Images/' prefix after our replacement
              .replace(/assets\/images\/Images\//g, 'assets/images/');
          }

          function collectPartials(dir, map = {}) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                collectPartials(full, map);
              } else if (entry.name.endsWith('.html')) {
                const key = path.relative(path.join(BASE, 'Partials'), full)
                  .replace(/\\/g, '/').replace('.html', '');
                map[key] = fs.readFileSync(full, 'utf8');
              }
            }
            return map;
          }

          const partials = collectPartials(path.join(BASE, 'Partials'));

          function inlinePartials(html, depth = 0) {
            if (depth > 5) return html;
            return html.replace(
              /<f:render\s+partial="([^"]+)"[^/]*(\/?>|>[\s\S]*?<\/f:render>)/g,
              (_, name) => {
                const src = partials[name] || partials[name.replace(/\//g, '_')] || '';
                return src ? inlinePartials(src, depth + 1) : '';
              }
            );
          }

          function injectFallbackNavigation(html, prefix, pageOut) {
            const links = [
              { out: 'index.html', label: 'Startseite' },
              { out: 'bauherrenberatung/index.html', label: 'Bauherrenberatung' },
              { out: 'architektur-bauleitung/index.html', label: 'Architektur & Bauleitung' },
              { out: 'generalunternehmer-mandate/index.html', label: 'GU-Mandate' },
              { out: 'vermarktung/index.html', label: 'Vermarktung' },
              { out: 'energieberatung/index.html', label: 'Energieberatung' },
              { out: 'ueber-uns/index.html', label: 'Über uns' },
            ];

            const desktop = links.map((l) => {
              const isActive = l.out === pageOut;
              const liClass = isActive ? 'site-nav__item site-nav__item--active' : 'site-nav__item';
              const aClass = isActive ? 'site-nav__link site-nav__link--active' : 'site-nav__link';
              const aria = isActive ? ' aria-current="page"' : '';
              return `<li class="${liClass}"><a href="${prefix}${l.out}" class="${aClass}"${aria}>${l.label}</a></li>`;
            }).join('');

            const mobile = links.map((l) => {
              const isActive = l.out === pageOut;
              const aClass = isActive ? 'mobile-nav__link mobile-nav__link--active' : 'mobile-nav__link';
              const aria = isActive ? ' aria-current="page"' : '';
              return `<li class="mobile-nav__item"><a href="${prefix}${l.out}" class="${aClass}"${aria}>${l.label}</a></li>`;
            }).join('');

            return html
              .replace(/<ul class="site-nav__links"[\s\S]*?<\/ul>/, `<ul class="site-nav__links" role="list">${desktop}</ul>`)
              .replace(/<ul class="mobile-nav__links"[\s\S]*?<\/ul>/, `<ul class="mobile-nav__links" role="list">${mobile}</ul>`)
              .replace(/<a href="#" class="site-nav__logo"/g, `<a href="${prefix}index.html" class="site-nav__logo"`);
          }

          const layoutSrc = fs.readFileSync(
            path.join(BASE, 'Layouts/Default.html'), 'utf8'
          );

          const pages = [
            {
              tpl: 'Page/Default',
              out: 'index.html',
              title: 'Startseite',
              pageTitle: 'Reasco Immobilien AG',
              subtitle: 'Immobilienkompetenz in Schaffhausen',
              description: 'Reasco Immobilien AG – Bauherrenberatung, Architektur, GU-Mandate, Vermarktung und Energieberatung in der Region Schaffhausen.'
            },
            {
              tpl: 'Page/Service',
              out: 'bauherrenberatung/index.html',
              title: 'Bauherrenberatung',
              pageTitle: 'Bauherrenberatung',
              subtitle: 'Leistung',
              description: 'Strategische und technische Bauherrenberatung von der Projektidee bis zur Realisierung.'
            },
            {
              tpl: 'Page/Service',
              out: 'architektur-bauleitung/index.html',
              title: 'Architektur und Bauleitung',
              pageTitle: 'Architektur und Bauleitung',
              subtitle: 'Leistung',
              description: 'Planung, Projektierung und Bauleitung für anspruchsvolle Immobilienprojekte.'
            },
            {
              tpl: 'Page/Service',
              out: 'generalunternehmer-mandate/index.html',
              title: 'GU-Mandate',
              pageTitle: 'Generalunternehmer-Mandate',
              subtitle: 'Leistung',
              description: 'Begleitung und Steuerung von GU-Mandaten mit Fokus auf Qualität, Kosten und Termine.'
            },
            {
              tpl: 'Page/Service',
              out: 'vermarktung/index.html',
              title: 'Vermarktung',
              pageTitle: 'Immobilienvermarktung',
              subtitle: 'Leistung',
              description: 'Professionelle Vermarktung von Wohn- und Anlageimmobilien mit regionaler Marktkenntnis.'
            },
            {
              tpl: 'Page/Service',
              out: 'energieberatung/index.html',
              title: 'Energieberatung',
              pageTitle: 'Energieberatung',
              subtitle: 'Leistung',
              description: 'Energieeffiziente Sanierungs- und Neubaukonzepte mit Blick auf Nachhaltigkeit und Wirtschaftlichkeit.'
            },
            {
              tpl: 'Page/About',
              out: 'ueber-uns/index.html',
              title: 'Über uns',
              pageTitle: 'Über uns',
              subtitle: 'Reasco Immobilien AG',
              description: 'Das Team, die Werte und die Arbeitsweise von Reasco Immobilien AG.'
            },
          ];

          const baseUrl = 'https://kush4i20.github.io/reasco_typo3';

          for (const page of pages) {
            const tplSrc  = fs.readFileSync(
              path.join(BASE, 'Templates', `${page.tpl}.html`), 'utf8'
            );

            // Extract sections from template
            const sections = {};
            for (const m of tplSrc.matchAll(/<f:section\s+name="([^"]+)">([\s\S]*?)<\/f:section>/g)) {
              sections[m[1]] = m[2];
            }
            const contentHtml = sections['content'] || tplSrc;

            // Build full page by inserting content into layout
            let full = layoutSrc
              .replace(/<f:render\s+section="content"[^/]*\/>/g, contentHtml)
              .replace(/<f:render\s+section="content"[^>]*>[\s\S]*?<\/f:render>/g, contentHtml);

            full = applyPageVars(full, page);
            full = inlinePartials(full);
            full = resolveFluidIf(full, page);
            full = stripFluid(full);

            // Fix asset paths relative to nested pages
            const depth = page.out.split('/').length - 1;
            const prefix = depth > 0 ? '../'.repeat(depth) : './';
            const pageUrl = `${baseUrl}/${page.out.replace(/index\.html$/, '')}`;
            full = full
              .replace(/assets\/css\//g,    `${prefix}assets/css/`)
              .replace(/assets\/js\//g,     `${prefix}assets/js/`)
              .replace(/assets\/images\//g, `${prefix}assets/images/`)
              .replace(/href="\/"/g,        `href="${prefix}index.html"`);

            full = injectFallbackNavigation(full, prefix, page.out);

            // Ensure absolute SEO URLs in preview output.
            full = full
              .replace(/<link\s+rel="canonical"\s+href="[^"]*"\s*\/?>(?![\s\S]*<link\s+rel="canonical")/i,
                `<link rel="canonical" href="${pageUrl}">`)
              .replace(/<meta\s+property="og:url"\s+content="[^"]*"\s*\/?>(?![\s\S]*<meta\s+property="og:url")/i,
                `<meta property="og:url" content="${pageUrl}">`);

            // Inject real <title> and minimal head if missing
            full = full
              .replace(/<title>[^<]*<\/title>/, `<title>${page.title} – Reasco Immobilien AG</title>`)
              .replace('</head>',
                `  <link rel="stylesheet" href="${prefix}assets/css/styles.css">\n</head>`)
              .replace('</body>',
                `  <script src="${prefix}assets/js/scripts.js"></script>\n</body>`);

            const outPath = path.join(DIST, page.out);
            fs.mkdirSync(path.dirname(outPath), { recursive: true });
            fs.writeFileSync(outPath, full, 'utf8');
            console.log('Written:', outPath);
          }

          const sitemapUrls = pages.map((p) => `${baseUrl}/${p.out.replace(/index\.html$/, '')}`);
          const sitemapXml =
            '<?xml version="1.0" encoding="UTF-8"?>\n' +
            '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n' +
            sitemapUrls.map((u) => `  <url><loc>${u}</loc></url>`).join('\n') +
            '\n</urlset>\n';
          fs.writeFileSync(path.join(DIST, 'sitemap.xml'), sitemapXml, 'utf8');

          const robotsTxt = [
            'User-agent: *',
            'Allow: /',
            `Sitemap: ${baseUrl}/sitemap.xml`,
            ''
          ].join('\n');
          fs.writeFileSync(path.join(DIST, 'robots.txt'), robotsTxt, 'utf8');
          EOF

      - name: Validate generated HTML (SEO baseline)
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const dist = 'dist';
          const htmlFiles = [];

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(full);
              else if (entry.name.endsWith('.html')) htmlFiles.push(full);
            }
          }

          walk(dist);

          const failures = [];

          for (const file of htmlFiles) {
            const src = fs.readFileSync(file, 'utf8');
            const checks = [
              ['<html lang="de-CH"', /<html[^>]*lang="de-CH"/i],
              ['title tag', /<title>[^<]{8,}<\/title>/i],
              ['meta description', /<meta[^>]*name="description"[^>]*content="[^"]{30,}"/i],
              ['canonical link', /<link[^>]*rel="canonical"[^>]*href="https?:\/\//i],
              ['og:title', /<meta[^>]*property="og:title"/i],
              ['og:description', /<meta[^>]*property="og:description"/i],
              ['single h1', (src.match(/<h1\b/gi) || []).length === 1],
              ['json-ld script', /<script[^>]*type="application\/ld\+json"/i]
            ];

            for (const [label, test] of checks) {
              const ok = typeof test === 'boolean' ? test : test.test(src);
              if (!ok) failures.push(`${file}: missing/invalid ${label}`);
            }
          }

          if (failures.length) {
            console.error('SEO baseline validation failed:\n' + failures.join('\n'));
            process.exit(1);
          }

          console.log(`Validated ${htmlFiles.length} HTML files.`);
          EOF

          # Add a small index for easier manual QA in GitHub Pages.
          cat > dist/preview-hub.html <<'HTML'
          <!doctype html>
          <html lang="de">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Preview Hub</title>
            <style>
              body{font-family:system-ui,-apple-system,sans-serif;margin:2rem;line-height:1.5}
              h1{margin:0 0 1rem}
              ul{padding-left:1.25rem}
              a{color:#0b5cab}
            </style>
          </head>
          <body>
            <h1>Reasco Preview Hub</h1>
            <ul>
              <li><a href="./index.html">Startseite</a></li>
              <li><a href="./bauherrenberatung/index.html">Bauherrenberatung</a></li>
              <li><a href="./architektur-bauleitung/index.html">Architektur und Bauleitung</a></li>
              <li><a href="./generalunternehmer-mandate/index.html">GU-Mandate</a></li>
              <li><a href="./vermarktung/index.html">Vermarktung</a></li>
              <li><a href="./energieberatung/index.html">Energieberatung</a></li>
              <li><a href="./ueber-uns/index.html">Über uns</a></li>
            </ul>
          </body>
          </html>
          HTML

      # ── Lint CSS ──────────────────────────────────────────────────────────
      - name: Check CSS syntax
        run: |
          cat > .stylelint-ci.json <<'JSON'
          {
            "rules": {
              "no-duplicate-selectors": true,
              "block-no-empty": true,
              "color-no-invalid-hex": true
            }
          }
          JSON

          npx --yes stylelint \
            "packages/reasco_site/Resources/Public/Css/styles.css" \
            --config .stylelint-ci.json

      # ── Upload pages artifact ─────────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-preview
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
