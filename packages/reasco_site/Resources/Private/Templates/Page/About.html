<f:layout name="Default"/>
<f:comment>
    Template: Über uns (Backend Layout 3)
    colPos: 10 Hero | 20 Geschichte | 30 Werte | 40 Team | 50 Mitgliedschaften | 60 Karriere
</f:comment>

<f:section name="content">

    <!-- ── Hero ─────────────────────────────────────── -->
    <f:render partial="Hero/SubPage" arguments="{page: page}"/>

    <!-- ── Geschichte (colPos 20) ────────────────────── -->
    <section class="section section--white" aria-labelledby="story-heading">
        <div class="container">
            <f:cObject typoscriptObjectPath="lib.dynamicContent">
                <f:variable name="colPos">20</f:variable>
            </f:cObject>
        </div>
    </section>

    <!-- ── Werte (colPos 30) ──────────────────────────── -->
    <section class="section section--dark" aria-labelledby="values-heading">
        <div class="container">
            <f:cObject typoscriptObjectPath="lib.dynamicContent">
                <f:variable name="colPos">30</f:variable>
            </f:cObject>
        </div>
    </section>

    <!-- ── Team (colPos 40) ──────────────────────────── -->
    <section class="section section--white" id="team" aria-labelledby="team-heading">
        <div class="container">
            <div class="section-header reveal">
                <span class="label">Das Team</span>
                <h2 id="team-heading">Die Menschen hinter reasco.</h2>
                <p>Rund 20 engagierte Fachleute in fünf Kernbereichen.</p>
            </div>
            <f:cObject typoscriptObjectPath="lib.dynamicContent">
                <f:variable name="colPos">40</f:variable>
            </f:cObject>
            <!-- Statisches Team-Grid als Fallback / Basis -->
            <f:render partial="Content/TeamGrid" arguments="{}"/>
        </div>
    </section>

    <!-- ── Mitgliedschaften (colPos 50) ──────────────── -->
    <section class="section section--light" aria-labelledby="memberships-heading">
        <div class="container">
            <f:render partial="Content/Memberships" arguments="{}"/>
            <f:cObject typoscriptObjectPath="lib.dynamicContent">
                <f:variable name="colPos">50</f:variable>
            </f:cObject>
        </div>
    </section>

    <!-- ── Karriere (colPos 60) ──────────────────────── -->
    <section class="section section--white" id="jobs" aria-labelledby="jobs-heading">
        <div class="container container--narrow">
            <div class="section-header reveal">
                <span class="label">Karriere</span>
                <h2 id="jobs-heading">Arbeiten bei reasco.</h2>
            </div>
            <f:cObject typoscriptObjectPath="lib.dynamicContent">
                <f:variable name="colPos">60</f:variable>
            </f:cObject>
        </div>
    </section>

    <!-- ── CTA ──────────────────────────────────────── -->
    <f:render partial="Components/CTA" arguments="{
        label: 'Kontakt',
        heading: 'Lassen Sie uns zusammenarbeiten.',
        text: 'Haben Sie ein Projekt oder möchten Sie uns kennenlernen? Wir freuen uns auf Ihre Nachricht.',
        btnPrimary: 'Nachricht senden',
        btnPrimaryHref: 'mailto:{email}',
        btnSecondary: phone,
        btnSecondaryHref: 'tel:+41525510777'
    }"/>

</f:section>
