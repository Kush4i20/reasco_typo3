<f:comment>Partial: Kontaktformular + Adresse</f:comment>
<div class="contact-grid">

    <!-- Adresse & Kontaktdaten -->
    <div class="contact-info reveal">
        <address style="font-style:normal;">
            <div class="contact-info__logo">
                <img src="{f:uri.resource(path: 'Images/logo.svg', extensionName: 'reasco_site')}"
                     alt="Reasco Immobilien AG"
                     width="140"
                     height="26"
                     loading="lazy">
            </div>

            <div class="contact-details">
                <div class="contact-detail">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18" aria-hidden="true">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                    <div>
                        SIG Areal, Bau 53<br>
                        Industrieplatz 1e<br>
                        CH-8212 Neuhausen am Rheinfall
                    </div>
                </div>
                <div class="contact-detail">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18" aria-hidden="true">
                        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.06 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 .99h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
                    </svg>
                    <a href="tel:{phone -> f:format.replace(search: ' ', replace: '')}">{phone}</a>
                </div>
                <div class="contact-detail">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18" aria-hidden="true">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    <a href="mailto:{email}">{email}</a>
                </div>
                <div class="contact-detail">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18" aria-hidden="true">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    <a href="mailto:{emailSales}">{emailSales}</a>
                    <span class="contact-detail__note">(Vermarktung)</span>
                </div>
            </div>
        </address>

        <div class="contact-opening-hours">
            <h3>Öffnungszeiten</h3>
            <table class="opening-hours-table">
                <tr><td>Mo–Fr</td><td>08:00 – 12:00 Uhr</td></tr>
                <tr><td></td><td>13:30 – 17:30 Uhr</td></tr>
            </table>
        </div>
    </div>

    <!-- Kontaktformular -->
    <div class="contact-form-wrap reveal reveal-delay-2">
        <h3 class="contact-form__title">Nachricht senden</h3>
        <form class="contact-form js-contact-form" novalidate method="post" action="{f:uri.page()}">
            <input type="hidden" name="tx_reasco[action]" value="contact">
            <input type="hidden" name="tx_reasco[controller]" value="Form">

            <div class="form-row">
                <div class="form-group">
                    <label for="contact-name">Name <span aria-hidden="true">*</span></label>
                    <input type="text"
                           id="contact-name"
                           name="tx_reasco[name]"
                           required
                           autocomplete="name"
                           placeholder="Max Muster">
                </div>
                <div class="form-group">
                    <label for="contact-email">E-Mail <span aria-hidden="true">*</span></label>
                    <input type="email"
                           id="contact-email"
                           name="tx_reasco[email]"
                           required
                           autocomplete="email"
                           placeholder="max@beispiel.ch">
                </div>
            </div>

            <div class="form-group">
                <label for="contact-phone">Telefon</label>
                <input type="tel"
                       id="contact-phone"
                       name="tx_reasco[phone]"
                       autocomplete="tel"
                       placeholder="+41 52 XXX XX XX">
            </div>

            <div class="form-group">
                <label for="contact-subject">Betreff</label>
                <select id="contact-subject" name="tx_reasco[subject]">
                    <option value="">Bitte wählen…</option>
                    <option value="bauherrenberatung">Bauherrenberatung</option>
                    <option value="architektur">Architektur &amp; Bauleitung</option>
                    <option value="gu">GU-Mandat</option>
                    <option value="vermarktung">Immobilienvermarktung</option>
                    <option value="energie">Energieberatung</option>
                    <option value="bewertung">Kostenlose Immobilienbewertung</option>
                    <option value="allgemein">Allgemeine Anfrage</option>
                </select>
            </div>

            <div class="form-group">
                <label for="contact-message">Nachricht <span aria-hidden="true">*</span></label>
                <textarea id="contact-message"
                          name="tx_reasco[message]"
                          required
                          rows="5"
                          placeholder="Beschreiben Sie kurz Ihr Anliegen…"></textarea>
            </div>

            <div class="form-group form-group--checkbox">
                <label class="form-checkbox">
                    <input type="checkbox" name="tx_reasco[privacy]" required>
                    <span>Ich akzeptiere die <a href="{f:uri.page(pageUid: '##DATENSCHUTZ_UID##')}">Datenschutzerklärung</a> <span aria-hidden="true">*</span></span>
                </label>
            </div>

            <button type="submit" class="btn btn--primary btn--full">
                Nachricht senden
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" aria-hidden="true">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
            <p class="form-note">* Pflichtfelder. Ihre Daten werden vertraulich behandelt.</p>
        </form>
    </div>

</div>
